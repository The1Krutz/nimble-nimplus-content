name: Create Release on PR Merge

on:
  pull_request:
    types:
      - closed
    branches:
      - main

permissions:
  contents: write

jobs:
  create-release:
    if: github.event.pull_request.merged == true
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Pack json into ldb
        run: |
          npm run packLDB

      - name: Create assets
        run: |
          zip -r module.zip assets/ lang/ packs/ module.json LICENSE README.md

      - name: Get module version
        id: read_json
        run: |
          VERSION=$(jq -r '.version' module.json)
          echo "version=v$VERSION"
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      # https://github.com/softprops/action-gh-release
      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          tag_name: ${{ steps.read_json.outputs.version }}
          generate_release_notes: true
          files: |
            module.zip
            module.json

      - name: Publish to FoundryVTT
        id: publish_to_fvtt
        uses: cs96and/FoundryVTT-release-package@v1
        with:
          package-token: ${{ secrets.PACKAGE_TOKEN }}
          manifest-url: https://github.com/${{github.repository}}/releases/download/${{steps.read_json.outputs.version}}/module.json
          notes-url: https://github.com/${{github.repository}}/releases/tag/${{steps.read_json.outputs.version}}/
