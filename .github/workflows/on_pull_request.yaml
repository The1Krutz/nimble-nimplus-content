name: PR Checks

on:
  pull_request:
    branches: ['**']

permissions:
  contents: write

jobs:
  pr-build:
    name: Pr Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Check format
        run: npm run format:check

      - name: Pack json into ldb
        run: |
          npm run packLDB

      - name: Create assets
        run: |
          zip -r module.zip assets/ lang/ packs/ module.json LICENSE README.md
